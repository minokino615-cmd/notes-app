<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#378ADD"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Заметки"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Мои заметки</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:1rem 1rem 6rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-top:0.5rem}
.header h1{font-size:20px;font-weight:600;color:#1a1a2e}
#note-count{font-size:13px;color:#888}
.note-card{background:#fff;border:1px solid #e8e8f0;border-radius:14px;padding:1rem 1.25rem;margin-bottom:12px;transition:transform 0.15s}
.note-card:active{transform:scale(0.99)}
.note-card.has-alarm{border-left:3px solid #378ADD;border-radius:0 14px 14px 0}
.note-card.alarm-fired{border-left:3px solid #3B6D11}
.note-title{font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.note-text{font-size:13px;color:#555;line-height:1.5;margin-bottom:8px}
.note-meta{display:flex;align-items:center;justify-content:space-between}
.alarm-badge{display:flex;align-items:center;gap:4px;font-size:12px;color:#185FA5;background:#E6F1FB;padding:3px 8px;border-radius:8px}
.note-actions{display:flex;gap:6px}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;color:#888;border-radius:8px}
.icon-btn:hover{background:#f0f0f5;color:#333}
.icon-btn i{font-size:17px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:480px}
.modal h2{font-size:17px;font-weight:600;margin-bottom:1.25rem;color:#1a1a2e}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:#666;margin-bottom:4px;font-weight:500}
.field input,.field textarea{width:100%;font-size:15px;padding:10px 12px;border:1px solid #dde;border-radius:10px;background:#f8f8fc;color:#1a1a2e;font-family:inherit;outline:none}
.field input:focus,.field textarea:focus{border-color:#378ADD;background:#fff}
.field textarea{min-height:80px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-primary{background:#378ADD;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-cancel{background:none;border:1px solid #dde;border-radius:10px;padding:10px 14px;font-size:15px;cursor:pointer;color:#666;font-family:inherit}
.empty{text-align:center;padding:4rem 1rem;color:#aaa}
.empty i{font-size:48px;display:block;margin-bottom:12px;color:#ccc}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#378ADD;color:#fff;border:none;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(55,138,221,0.4);z-index:50}
.notif-bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#185FA5;color:#fff;padding:12px 20px;border-radius:14px;font-size:14px;display:flex;align-items:center;gap:8px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.2);max-width:90vw;animation:slideDown 0.3s ease}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.install-bar{background:#378ADD;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-size:13px;gap:8px}
.install-bar button{background:#fff;color:#378ADD;border:none;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-weight:600}
</style>
</head>
<body>

<div id="install-bar" class="install-bar" style="display:none">
  <span>📲 Установите приложение на экран</span>
  <button onclick="installApp()">Установить</button>
  <button onclick="document.getElementById('install-bar').style.display='none'" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.5)">✕</button>
</div>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-notes" style="font-size:20px;vertical-align:-2px;margin-right:6px"></i>Мои заметки</h1>
    <span id="note-count"></span>
  </div>
  <div id="notes-list"></div>
  <div id="empty-state" class="empty" style="display:none">
    <i class="ti ti-notes"></i>
    <p style="font-size:16px;font-weight:500;color:#888;margin-bottom:4px">Нет заметок</p>
    <p style="font-size:13px">Нажмите + чтобы добавить</p>
  </div>
</div>

<button class="fab" onclick="openModal()" aria-label="Добавить заметку">
  <i class="ti ti-plus"></i>
</button>

<div id="modal" class="modal-backdrop" style="display:none">
  <div class="modal">
    <h2 id="modal-title">Новая заметка</h2>
    <div class="field"><label>Заголовок</label><input type="text" id="inp-title" placeholder="Купить продукты"/></div>
    <div class="field"><label>Текст</label><textarea id="inp-text" placeholder="Подробности..."></textarea></div>
    <div class="field"><label><i class="ti ti-bell" style="font-size:14px;vertical-align:-1px;margin-right:4px"></i>Будильник</label><input type="datetime-local" id="inp-alarm"/></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-primary" onclick="saveNote()">Сохранить</button>
    </div>
  </div>
</div>

<div id="notif" class="notif-bar" style="display:none"></div>

<script>
let notes = JSON.parse(localStorage.getItem('notes_v1')||'[]');
let editId = null;
let alarmTimers = {};
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-bar').style.display='flex';
});

function installApp() {
  if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{ document.getElementById('install-bar').style.display='none'; deferredPrompt=null; }); }
}

function save(){localStorage.setItem('notes_v1',JSON.stringify(notes));}

function fmt(dt){
  if(!dt)return null;
  const d=new Date(dt);
  return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function render(){
  const list=document.getElementById('notes-list');
  const empty=document.getElementById('empty-state');
  const count=document.getElementById('note-count');
  count.textContent=notes.length?notes.length+' заметок':'';
  if(!notes.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=notes.map(n=>{
    const hasFired=n.alarm&&new Date(n.alarm)<=new Date();
    return `<div class="note-card ${n.alarm?'has-alarm':''} ${hasFired?'alarm-fired':''}" id="card-${n.id}">
      <div class="note-title">${n.title||'(без заголовка)'}</div>
      ${n.text?`<div class="note-text">${n.text}</div>`:''}
      <div class="note-meta">
        ${n.alarm?`<span class="alarm-badge"><i class="ti ti-bell"></i>${fmt(n.alarm)}</span>`:'<span></span>'}
        <div class="note-actions">
          <button class="icon-btn" onclick="editNote('${n.id}')"><i class="ti ti-edit"></i></button>
          <button class="icon-btn" onclick="deleteNote('${n.id}')"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function scheduleAlarms(){
  Object.values(alarmTimers).forEach(clearTimeout);
  alarmTimers={};
  notes.forEach(n=>{
    if(!n.alarm)return;
    const ms=new Date(n.alarm)-Date.now();
    if(ms>0){
      alarmTimers[n.id]=setTimeout(()=>{
        showNotif('⏰ '+( n.title||'Заметка')+' — время пришло!');
        if('serviceWorker' in navigator && Notification.permission==='granted'){
          navigator.serviceWorker.ready.then(sw=>{
            sw.showNotification('⏰ '+( n.title||'Напоминание'),{body:n.text||'',icon:'icons/icon-192.png',badge:'icons/icon-192.png',vibrate:[200,100,200]});
          });
        }
        const card=document.getElementById('card-'+n.id);
        if(card)card.classList.add('alarm-fired');
      },ms);
    }
  });
}

function showNotif(msg){
  const el=document.getElementById('notif');
  el.innerHTML='<i class="ti ti-bell"></i> '+msg;
  el.style.display='flex';
  setTimeout(()=>el.style.display='none',5000);
}

function openModal(id){
  editId=id||null;
  document.getElementById('modal-title').textContent=id?'Редактировать':'Новая заметка';
  if(id){const n=notes.find(x=>x.id===id);document.getElementById('inp-title').value=n.title||'';document.getElementById('inp-text').value=n.text||'';document.getElementById('inp-alarm').value=n.alarm?n.alarm.slice(0,16):'';}
  else{document.getElementById('inp-title').value='';document.getElementById('inp-text').value='';document.getElementById('inp-alarm').value='';}
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('inp-title').focus(),100);
  if(Notification.permission==='default')Notification.requestPermission();
}

function closeModal(){document.getElementById('modal').style.display='none';editId=null;}

function saveNote(){
  const title=document.getElementById('inp-title').value.trim();
  const text=document.getElementById('inp-text').value.trim();
  const alarm=document.getElementById('inp-alarm').value;
  if(!title&&!text){document.getElementById('inp-title').focus();return;}
  if(editId){const i=notes.findIndex(x=>x.id===editId);if(i>-1)notes[i]={...notes[i],title,text,alarm:alarm||null};}
  else{notes.unshift({id:Date.now().toString(),title,text,alarm:alarm||null,created:new Date().toISOString()});}
  save();render();scheduleAlarms();closeModal();
  showNotif(alarm?'✅ Сохранено с будильником':'✅ Заметка сохранена');
}

function editNote(id){openModal(id);}
function deleteNote(id){notes=notes.filter(x=>x.id!==id);if(alarmTimers[id]){clearTimeout(alarmTimers[id]);delete alarmTimers[id];}save();render();}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}

render();scheduleAlarms();
</script>
</body>
</html>
